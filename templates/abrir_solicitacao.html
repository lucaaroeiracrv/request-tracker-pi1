<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abrir Solicitação</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* Reset e variáveis */
:root{
  --blue: #0170ca;
  --white: #ffffff;
  --muted: #f5f5f5;
  --text: #0c0c0c;
  --menu-width: 260px;
  --transition: 300ms;
  --max-width: 1100px;
  --font: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
}
*{box-sizing:border-box}

html,body{height:100%}

body{
  margin:0;
  font-family:var(--font);
  color:var(--text);
  background:var(--white);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* título central (responsivo) */
.site-title{
  font-size: 20px;
  font-weight:600;
  margin:0;
  flex:1;
  text-align:center;
  color:var(--white);
  margin-top: 5px;
}

.card {
  width: 100%;
  max-width: 420px;
  background: #fff;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.377);
  padding-top: 20px;
}

label {
    display: block;
    margin-top: 12px
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ddd
}

.btn {
    margin-top: 14px;
    width: 100%;
    padding: 10px;
    border: 0;
    border-radius: 6px;
    background: var(--blue);
    color: var(--white);
    font-weight: 600;
    cursor: pointer
}

.links {
    display: flex;
    justify-content: space-between;
    margin-top: 10px
}

.links a {
    font-size: 14px;
    color: var(--blue);
    text-decoration: none
}

/* Footer */
.site-footer{
  background:var(--blue);
  color:var(--white);
  text-align:center;
  padding: 8px 16px;
  bottom: 0;
  width: 100%; /* Para ocupar a largura total */
}

/* MAIN CENTRALIZADO */
.centered{
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 5px; /* <<< ESPAÇO REAL ABAIXO DO HEADER */
  padding-block: 60px;
}

/* HEADER */
.site-header {
  background-color: #0170ca;
  color: white;
  padding: 20px 0;
  text-align: center;
  font-size: 17px;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: center;
}

/* MENU PRINCIPAL */
.menu {
  list-style: none;
  display: flex;
  gap: 20px;
  padding: 0;
  margin: 0;
}

/* LINKS */
.menu li a {
  text-decoration: none;
  color: white;
  padding: 5px 12px;
  transition: 0.3s;
}

.menu li a:hover {
  background-color: #128bdb;
  border-radius: 15px;
}

/* DROPDOWN */
.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color:  #237dc7;
  list-style: none;
  padding: 10px;
  margin: 0;
  top: 100%;
  left: 0;
  min-width: 175px;
}

/* ITENS DO DROPDOWN */
.dropdown-content li {
  margin: 5px 0;
  text-align: justify;
}

/* MOSTRAR DROPDOWN */
.dropdown:hover .dropdown-content {
  display: block;
}/* Add your custom styles here */
  </style>
</head>
<body>
  <header class="card">
    <h1>Abrir Solicitação</h1>
    <p>Use o formulário abaixo para registrar uma nova solicitação.</p>
  </header>

  <main class="card">
    {% if errors %}
      <div class="card">
        <ul>
          {% for error in errors %}
            <li>{{ error }}</li>
          {% endfor %}
        </ul>
      </div>
    {% endif %}

    {% if success %}
      <div class="card">
        <p>{{ success }}</p>
      </div>
    {% endif %}

    <form action="/salvar" method="post">
      <label>
        Categoria
        <input type="text" name="categoria" value="{{ categoria | default('') }}" required>
      </label>

      <label>
    Descrição <br>
    <textarea name="descricao" rows="4" required>{{ descricao | default('') }}</textarea>
      </label>

      <label>
        Urgência (1 a 3)
        <input type="number" name="urgencia" min="1" max="3" value="{{ urgencia | default('1') }}" required>
      </label>

      <label>
        Impacto (1 a 3)
        <input type="number" name="impacto" min="1" max="3" value="{{ impacto | default('1') }}" required>
      </label>

      <button type="submit" class="btn primary">Salvar Solicitação</button>
    </form>
  </main>
</body>
</html>
